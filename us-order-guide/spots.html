<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#2563EB">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>스팟 - NYC Guide</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="app-header">
  <h1>📍 관광 스팟</h1>
</header>

<!-- Region Tabs -->
<div class="region-tabs">
  <button class="region-tab active" data-region="downtown">다운타운</button>
  <button class="region-tab" data-region="midtown">미드타운</button>
  <button class="region-tab" data-region="uptown">어퍼사이드</button>
  <button class="region-tab" data-region="queens">Queens</button>
  <button class="region-tab" data-region="washington">Washington D.C.</button>
</div>

<!-- Offline Banner -->
<div id="offline-banner" class="offline-banner hidden">오프라인 — 마지막 캐시 날씨 표시 중</div>

<!-- Weather -->
<div class="weather-section">
  <div id="weather-scroll" class="weather-scroll">
    <div class="w-loading">날씨 불러오는 중…</div>
  </div>
</div>

<!-- Category Filter -->
<div class="cat-row">
  <button class="cat-chip active" data-cat="all">전체</button>
  <button class="cat-chip" data-cat="landmark">🗽 랜드마크</button>
  <button class="cat-chip" data-cat="museum">🏛️ 박물관</button>
  <button class="cat-chip" data-cat="park">🌿 공원</button>
  <button class="cat-chip" data-cat="view">🔭 전망대</button>
  <button class="cat-chip" data-cat="market">🛍️ 마켓</button>
</div>

<!-- Spot List -->
<div id="spot-list" class="store-list"></div>

<!-- Bottom Nav -->
<nav class="bottom-nav">

    </svg>
  </a>

    </svg>
